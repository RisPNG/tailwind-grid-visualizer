[tools]
node = "20"

[tasks.install]
description = "Install project dependencies"
run = "npm install"

[tasks.compile]
description = "Compile the extension"
depends = ["install"]
run = "npm run compile"

[tasks.watch]
description = "Compile the extension and watch for changes"
depends = ["install"]
run = "npm run watch"

[tasks.package]
description = "Build the VS Code extension package"
depends = ["install"]
run = "npm run package"
